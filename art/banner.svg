<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Glow bar -->
  <rect x="100" y="148" width="1000" height="4" fill="url(#glow)" rx="2"/>

  <!-- Grid dots -->
  <g fill="#ffffff" opacity="0.04">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="150" cy="50" r="1.5"/>
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="250" cy="50" r="1.5"/>
    <circle cx="50" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="250" cy="100" r="1.5"/>
    <circle cx="950" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/>
    <circle cx="1050" cy="200" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="1150" cy="200" r="1.5"/>
    <circle cx="950" cy="250" r="1.5"/>
    <circle cx="1000" cy="250" r="1.5"/>
    <circle cx="1050" cy="250" r="1.5"/>
    <circle cx="1100" cy="250" r="1.5"/>
    <circle cx="1150" cy="250" r="1.5"/>
  </g>

  <!-- Logo box -->
  <rect x="462" y="40" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="490" y="78" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="26" fill="white" text-anchor="middle">AI</text>

  <!-- Title -->
  <text x="600" y="140" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="white" text-anchor="middle">
    <tspan fill="#e8e8ef">Laravel</tspan><tspan fill="#6366f1">AI</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="180" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="18" fill="#8888a0" text-anchor="middle">One interface, any AI — Ollama · OpenAI · Anthropic · DeepSeek</text>

  <!-- Install command -->
  <rect x="370" y="205" width="460" height="40" rx="8" fill="#12121a" stroke="#2a2a3d" stroke-width="1"/>
  <text x="385" y="231" font-family="monospace" font-size="14" fill="#22c55e">$ composer require muradbdinfo/laravelai</text>

  <!-- Provider badges -->
  <g transform="translate(310, 262)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#1a1a28" stroke="#2a2a3d" stroke-width="1"/>
    <text x="45" y="17" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#8888a0" text-anchor="middle">🦙 Ollama</text>

    <rect x="100" y="0" width="90" height="26" rx="13" fill="#1a1a28" stroke="#2a2a3d" stroke-width="1"/>
    <text x="145" y="17" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#8888a0" text-anchor="middle">🤖 OpenAI</text>

    <rect x="200" y="0" width="100" height="26" rx="13" fill="#1a1a28" stroke="#2a2a3d" stroke-width="1"/>
    <text x="250" y="17" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#8888a0" text-anchor="middle">🧠 Anthropic</text>

    <rect x="310" y="0" width="100" height="26" rx="13" fill="#1a1a28" stroke="#2a2a3d" stroke-width="1"/>
    <text x="360" y="17" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#8888a0" text-anchor="middle">🔮 DeepSeek</text>

    <rect x="420" y="0" width="80" height="26" rx="13" fill="#1a1a28" stroke="#6366f1" stroke-width="1"/>
    <text x="460" y="17" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">+ yours</text>
  </g>
</svg>
